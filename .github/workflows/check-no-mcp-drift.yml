name: Check no-MCP drift

on:
  schedule:
    - cron: "47 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install marketplace CLIs
        run: npm install -g @anthropic-ai/claude-code @openai/codex @google/gemini-cli@0.47.0

      - name: Smoke marketplace CLIs
        run: |
          command -v claude
          claude --version
          command -v codex
          codex --version
          command -v gemini
          gemini --version

      - name: Check no-MCP branch drift
        run: plugins/scripts/check-no-mcp-drift --compare-ref

      - name: Smoke main marketplace install
        run: plugins/scripts/smoke-marketplace-install --ref origin/main

      - name: Smoke no-MCP marketplace install
        run: plugins/scripts/smoke-marketplace-install --ref origin/marketplace-no-mcp
