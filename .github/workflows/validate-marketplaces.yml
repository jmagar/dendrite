name: Validate marketplaces

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - marketplace-no-mcp
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli@0.47.0

      - name: Validate marketplace manifests
        run: plugins/scripts/check-all
