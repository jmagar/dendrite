name: Validate marketplaces

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - marketplace-no-mcp
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install marketplace CLIs
        run: npm install -g @anthropic-ai/claude-code @openai/codex @google/gemini-cli@0.47.0

      - name: Smoke marketplace CLIs
        run: |
          command -v claude
          claude --version
          command -v codex
          codex --version
          command -v gemini
          gemini --version

      - name: Validate marketplace manifests
        run: plugins/scripts/check-all

      - name: Smoke marketplace installs
        run: plugins/scripts/smoke-marketplace-install
