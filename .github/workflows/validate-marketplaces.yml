name: Validate marketplaces

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - marketplace-no-mcp
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate marketplace manifests
        run: |
          jq empty .claude-plugin/marketplace.json .agents/plugins/marketplace.json
          python3 plugins/scripts/check-marketplace-sync
          python3 plugins/scripts/generate-readme-inventory --check --strict
