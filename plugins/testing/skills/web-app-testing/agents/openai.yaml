interface:
  display_name: "Web App Testing"
  short_description: "'Use when the user wants to live-test a WEB app/site end-to-end in a real browser and get a works/doesn''t-work + UI/UX report \u2014 not just write Playwright code. Triggers: \"test my web app\", \"QA this site\", \"run E2E on the web app\", \"click through every feature and tell me what breaks\", \"review the UX of this web app\", \"does my web app work\", \"test the deployed site\". Drives a real Chrome via Playwright over CDP (default http://127.0.0.1:9222), enumerates features from the DOM/ARIA tree, exercises each, captures screenshots + console/page/network errors, and emits a structured report. Sibling of android-app-testing and desktop-app-testing (shared report format). Does NOT fire for: writing a one-off Playwright script (use webwright), pure web design/build with no testing, or backend/API-only testing.'"
  default_prompt: "Use $web-app-testing for 'Use when the user wants to live-test a WEB app/site end-to-end in a real browser and get a works/doesn''t-work + UI/UX report \u2014 not just write Playwright code. Triggers: \"test my web app\", \"QA this site\", \"run E2E on the web app\", \"click through every feature and tell me what breaks\", \"review the UX of this web app\", \"does my web app work\", \"test the deployed site\". Drives a real Chrome via Playwright over CDP (default http://127.0.0.1:9222), enumerates features from the DOM/ARIA tree, exercises each, captures screenshots + console/page/network errors, and emits a structured report. Sibling of android-app-testing and desktop-app-testing (shared report format). Does NOT fire for: writing a one-off Playwright script (use webwright), pure web design/build with no testing, or backend/API-only testing.'."
