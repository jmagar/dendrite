interface:
  display_name: "Android App Testing"
  short_description: "'Use when the user wants to live-test an Android APK end-to-end on an emulator/device and get a works/doesn''t-work + UI/UX report \u2014 driving the real app, not writing test code. Triggers: \"test my Android app\", \"QA this APK\", \"run the app on the emulator and tell me what breaks\", \"click through every screen\", \"review the app''s UX\", \"does my APK work\", \"test the built APK\". Installs/launches the APK, enumerates screens from the accessibility tree, exercises each feature via adb (tap/type/swipe/launch), watches logcat for crashes/ANRs, captures screenshots + UI dumps, and emits a structured report. Primary path is direct local adb; optional richer path via claude-in-mobile. Sibling of web-app-testing and desktop-app-testing (shared report format). Does NOT fire for: building/coding an Android app (use claude-android-ninja / jetpack-compose-expert), iOS, or unit tests.'"
  default_prompt: "Use $android-app-testing for 'Use when the user wants to live-test an Android APK end-to-end on an emulator/device and get a works/doesn''t-work + UI/UX report \u2014 driving the real app, not writing test code. Triggers: \"test my Android app\", \"QA this APK\", \"run the app on the emulator and tell me what breaks\", \"click through every screen\", \"review the app''s UX\", \"does my APK work\", \"test the built APK\". Installs/launches the APK, enumerates screens from the accessibility tree, exercises each feature via adb (tap/type/swipe/launch), watches logcat for crashes/ANRs, captures screenshots + UI dumps, and emits a structured report. Primary path is direct local adb; optional richer path via claude-in-mobile. Sibling of web-app-testing and desktop-app-testing (shared report format). Does NOT fire for: building/coding an Android app (use claude-android-ninja / jetpack-compose-expert), iOS, or unit tests.'."
