interface:
  display_name: "TEI"
  short_description: "This skill should be used when the user wants to generate text embeddings, rerank a list of candidates by relevance, tokenize text, or inspect the loaded model on their Hugging Face Text Embeddings Inference (TEI) server. Triggers include: \\\"embed this text\\\", \\\"convert to a vector\\\", \\\"rerank these results\\\", \\\"what model is my TEI server running\\\", \\\"tokenize this sentence\\\", \\\"check TEI health\\\""
  default_prompt: "Use $tei for this skill should be used when the user wants to generate text embeddings, rerank a list of candidates by relevance, tokenize text, or inspect the loaded model on their Hugging Face Text Embeddings Inference (TEI) server. Triggers include: \\\"embed this text\\\", \\\"convert to a vector\\\", \\\"rerank these results\\\", \\\"what model is my TEI server running\\\", \\\"tokenize this sentence\\\", \\\"check TEI health\\\"."
