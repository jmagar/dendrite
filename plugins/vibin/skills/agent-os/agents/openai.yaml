interface:
  display_name: "Agent OS"
  short_description: "This skill should be used when the user wants to drive, control, screenshot, run PowerShell on, install software on, or interact with the agent-os Windows 11 sandbox VM. Triggers include: \\\"run X on agent-os\\\", \\\"screenshot agent-os\\\", \\\"PowerShell on agent-os\\\", \\\"spin up agent-os\\\", \\\"drive the windows VM\\\", \\\"the windows sandbox\\\", or \\\"winbox\\\". Also applies for web-dev browser verification against the agent-os Chrome endpoint. Does not apply for the user's personal Windows on steamy (use the nircmd skill). The sandbox is Claude's alone \u2014 install software, change settings, run shells freely without asking for confirmation"
  default_prompt: "Use $agent-os for this skill should be used when the user wants to drive, control, screenshot, run PowerShell on, install software on, or interact with the agent-os Windows 11 sandbox VM. Triggers include: \\\"run X on agent-os\\\", \\\"screenshot agent-os\\\", \\\"PowerShell on agent-os\\\", \\\"spin up agent-os\\\", \\\"drive the windows VM\\\", \\\"the windows sandbox\\\", or \\\"winbox\\\". Also applies for web-dev browser verification against the agent-os Chrome endpoint. Does not apply for the user's personal Windows on steamy (use the nircmd skill). The sandbox is Claude's alone \u2014 install software, change settings, run shells freely without asking for confirmation."
