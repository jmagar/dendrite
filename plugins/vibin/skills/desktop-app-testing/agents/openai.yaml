interface:
  display_name: "Desktop App Testing"
  short_description: "'Use when the user wants to live-test a built Windows desktop application (.exe) end-to-end inside the agent-os Windows 11 VM and get a works/doesn''t-work + UI/UX report \u2014 launching the real binary and driving it, not writing test code. Triggers: \"test my Windows app\", \"QA this .exe\", \"run my desktop build on agent-os and tell me what breaks\", \"click through the app\", \"review the desktop app''s UX\", \"does my exe work\", \"test the built binary in the Windows VM\". Gets the .exe into the VM, launches it, enumerates controls from the UI Automation tree, drives every feature (click/type by element), watches for crashes/hangs/error dialogs, captures screenshots + control-tree dumps, and emits a structured report. Drives the agent-os VM via the Windows-MCP gateway. Sibling of web-app-testing and android-app-testing (shared report format). Does NOT fire for: building/coding a desktop app, the user''s personal Windows on steamy (use nircmd), or general agent-os VM driving (use agent-os).'"
  default_prompt: "Use $desktop-app-testing for 'Use when the user wants to live-test a built Windows desktop application (.exe) end-to-end inside the agent-os Windows 11 VM and get a works/doesn''t-work + UI/UX report \u2014 launching the real binary and driving it, not writing test code. Triggers: \"test my Windows app\", \"QA this .exe\", \"run my desktop build on agent-os and tell me what breaks\", \"click through the app\", \"review the desktop app''s UX\", \"does my exe work\", \"test the built binary in the Windows VM\". Gets the .exe into the VM, launches it, enumerates controls from the UI Automation tree, drives every feature (click/type by element), watches for crashes/hangs/error dialogs, captures screenshots + control-tree dumps, and emits a structured report. Drives the agent-os VM via the Windows-MCP gateway. Sibling of web-app-testing and android-app-testing (shared report format). Does NOT fire for: building/coding a desktop app, the user''s personal Windows on steamy (use nircmd), or general agent-os VM driving (use agent-os).'."
